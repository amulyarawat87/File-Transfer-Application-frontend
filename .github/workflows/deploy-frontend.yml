name: Deploy Frontend to EC2

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build and Deploy Frontend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            # Exit immediately if any command fails
            set -euxo pipefail

            cd /home/ec2-user/file-transfer-app/File-Transfer-Application-frontend

            # Reset local changes and pull latest
            git fetch origin main
            git reset --hard origin/main

            # Install dependencies
            npm install

            # Build the frontend (workflow stops here if build fails)
            npm run build

            # Build Docker image
            docker build -t file-transfer-frontend .

            # Stop and remove existing container if it exists
            sudo docker stop file-transfer-frontend || true
            sudo docker rm file-transfer-frontend || true

            # Run new container
            sudo docker run -d \
              --restart=always \
              --name file-transfer-frontend \
              -p 3000:80 \
              file-transfer-frontend

            echo "✅ Frontend deployed successfully!"